<html>
<head>
  <meta charset="utf-8" />
  <title>CV Preview</title>
  <style>
    body { font-family: Calibri, sans-serif; margin: 24px; color: #222; }
    .head { text-align: center; border-bottom: 2px solid #2b6cb0; padding-bottom: 8px; margin-bottom: 14px; }
    h2 { margin: 16px 0 6px 0; color: #2b6cb0; }
  </style>
</head>
<body>
  <div class="head">
    <h1>{{full_name}}</h1>
    <p>{{email}} | {{phone}} | {{location}}</p>
  </div>
  <h2>Profile</h2>
  <p>{{summary}}</p>
  <h2>Experience</h2>
  <ul>{{experiences_html}}</ul>
  <h2>Skills</h2>
  <ul>{{skills_html}}</ul>
</body>
</html>
