upstream backend {
    server app:8001;
    keepalive 32;
}

# Rate limit zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=download:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=connlimit:10m;

# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    server_name _;
    server_tokens off;

    # Health check over HTTP (for internal Docker / LB probes)
    location = /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ──
server {
    listen 443 ssl http2;
    server_name _;

    # ── TLS certificates (mount via docker volume or env) ──
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Body size limit ──
    client_max_body_size 6m;

    # ── Connection limits ──
    limit_conn connlimit 20;

    # ── Timeouts ──
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    send_timeout 30s;
    client_body_timeout 10s;
    client_header_timeout 5s;
    keepalive_timeout 65s;

    # ── Security headers (CDN-safe) ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https: ws: wss:; frame-src 'self' blob:; object-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-XSS-Protection "0" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;

    # ── Hide server version ──
    server_tokens off;
    proxy_hide_header X-Powered-By;

    # ── Health check (no rate limit) ──
    location = /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req off;
    }

    # ── Auth endpoints (stricter rate) ──
    location ~ ^/(login|register|token) {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Download endpoints (moderate rate) ──
    location ~ ^/(download|presigned) {
        limit_req zone=download burst=10 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Frontend static files ──
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── API endpoints ──
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
    }

    # ── Backend direct endpoints (health, analyze, etc.) ──
    location ~ ^/(health|analyze|login|register|token|download|presigned|usage|admin|recruiter|feedback|history|cv-builder|render|jobs|candidates|organizations|compare|career-studio|templates|themes|blog) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
    }

    # ── Frontend SPA fallback ──
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # ── Block dotfiles ──
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Custom error pages ──
    error_page 429 = @ratelimit;
    location @ratelimit {
        default_type application/json;
        return 429 '{"detail":"Too many requests"}';
    }

    error_page 413 = @toolarge;
    location @toolarge {
        default_type application/json;
        return 413 '{"detail":"Request body too large"}';
    }
}
