name: Security

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  schedule:
    - cron: "20 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trust checked out repository
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run Gitleaks
        uses: docker://ghcr.io/gitleaks/gitleaks:v8.24.2
        with:
          args: detect --no-git --source . --config .gitleaks.toml --redact --verbose

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-1.0, AGPL-3.0

  python-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: Audit requirements.txt
        run: |
          pip-audit -r requirements.txt --strict --format json --output pip-audit-report.json

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  node-audit:
    name: Node dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            mobile/package-lock.json

      - name: Audit root npm dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm audit --audit-level=high --omit=dev --json > npm-audit-root.json
          else
            echo "{}" > npm-audit-root.json
          fi

      - name: Audit frontend npm dependencies
        if: always()
        run: |
          if [ -f frontend/package-lock.json ]; then
            npm audit --prefix frontend --audit-level=high --omit=dev --json > npm-audit-frontend.json
          else
            echo "{}" > npm-audit-frontend.json
          fi

      - name: Audit mobile npm dependencies
        if: always()
        run: |
          if [ -f mobile/package-lock.json ]; then
            npm audit --prefix mobile --audit-level=high --omit=dev --json > npm-audit-mobile.json
          else
            echo "{}" > npm-audit-mobile.json
          fi

      - name: Upload npm audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-reports
          path: |
            npm-audit-root.json
            npm-audit-frontend.json
            npm-audit-mobile.json
